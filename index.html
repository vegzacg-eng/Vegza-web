<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEGZA Construction Group</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#02152b;
color:white;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

.container{
max-width:1100px;
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}

.logo{
width:250px;
margin-bottom:20px;
}

h1{
font-size:60px;
margin:0 0 20px;
}

h1 span{
color:#33a1ff;
}

p{
font-size:18px;
line-height:1.7;
color:#d8e3f0;
}

.buttons{
margin-top:30px;
display:flex;
gap:20px;
}

.btn{
padding:15px 30px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.primary{
background:#0d6efd;
color:white;
}

.secondary{
border:2px solid white;
color:white;
}

.card{
background:rgba(255,255,255,.08);
padding:40px;
border-radius:20px;
}

.service{
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,.1);
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
text-align:center;
}

.logo{
width:200px;
}

h1{
font-size:40px;
}

.buttons{
justify-content:center;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="container">

<div>

<img src="logo-vegza.png" class="logo">

<h1>VEGZA <span>Construction</span></h1>

<p>
General Contractor & Plumbing Contractor serving Miami and all Florida with premium construction solutions.
</p>

<div class="buttons">
<a href="tel:7863258154" class="btn primary">Call Now</a>
<a href="https://wa.me/17863258154" class="btn secondary">WhatsApp</a>
</div>

</div>

<div class="card">

<h2>Our Services</h2>

<div class="service">✔ General Contractor</div>
<div class="service">✔ Plumbing Contractor</div>
<div class="service">✔ Residential Projects</div>
<div class="service">✔ Commercial Projects</div>
<div class="service">✔ Remodeling</div>

</div>

</div>

</section>

</body>
</html>
